<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40" width="120" height="40">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="50%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#fb923c"/>
    </linearGradient>
  </defs>
  
  <!-- 钳爪图形 -->
  <g transform="translate(2, 4)">
    <!-- 左侧钳臂 -->
    <path d="M8 12 C4 8, 2 4, 6 2 C10 0, 14 4, 10 10 L12 14" 
          fill="none" stroke="url(#logoGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 右侧钳臂 -->
    <path d="M24 12 C28 8, 30 4, 26 2 C22 0, 18 4, 22 10 L20 14" 
          fill="none" stroke="url(#logoGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 主体圆形 -->
    <circle cx="16" cy="20" r="8" fill="url(#logoGrad)"/>
    <!-- 眼睛 -->
    <circle cx="13" cy="18" r="1.5" fill="white"/>
    <circle cx="19" cy="18" r="1.5" fill="white"/>
    <!-- 下半圆弧 -->
    <path d="M8 22 C8 28, 24 28, 24 22" 
          fill="none" stroke="url(#logoGrad)" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  
  <!-- 文字 OneClaw -->
  <text x="42" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="url(#logoGrad)">OneClaw</text>
</svg>
