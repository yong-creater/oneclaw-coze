<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="50%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#fb923c"/>
    </linearGradient>
  </defs>
  
  <!-- 龙虾钳爪简化图形 -->
  <g transform="translate(4, 8)">
    <!-- 左钳臂 -->
    <path d="M6 10 L2 4 Q0 0 4 -1 Q8 -2 10 2 L12 10" 
          fill="none" stroke="url(#brandGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 右钳臂 -->
    <path d="M34 10 L38 4 Q40 0 36 -1 Q32 -2 30 2 L28 10" 
          fill="none" stroke="url(#brandGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 身体 -->
    <ellipse cx="20" cy="22" rx="12" ry="10" fill="url(#brandGrad)"/>
    <!-- 眼睛 -->
    <circle cx="15" cy="19" r="2" fill="white"/>
    <circle cx="25" cy="19" r="2" fill="white"/>
    <!-- 眼睛点 -->
    <circle cx="15.5" cy="19.5" r="0.8" fill="#ef4444"/>
    <circle cx="25.5" cy="19.5" r="0.8" fill="#ef4444"/>
    <!-- 触须 -->
    <path d="M12 12 Q8 6 4 4" fill="none" stroke="url(#brandGrad)" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M28 12 Q32 6 36 4" fill="none" stroke="url(#brandGrad)" stroke-width="1.5" stroke-linecap="round"/>
    <!-- 尾巴 -->
    <path d="M12 30 Q20 36 28 30" fill="none" stroke="url(#brandGrad)" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- 品牌文字 -->
  <text x="58" y="38" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" 
        font-size="24" font-weight="700" fill="#1f2937">
    <tspan fill="url(#brandGrad)">One</tspan><tspan fill="#374151">Claw</tspan>
  </text>
</svg>
